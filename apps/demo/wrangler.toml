# Cloudflare Workers Static Assets configuration for the zudo-sg demo site.
#
# This is a fully static site (no prerender=false API routes, no SSR adapter).
# So `main` and `nodejs_compat` are OMITTED.
# If an SSR route is added later, wire @takazudo/zfb-adapter-cloudflare in
# apps/demo/zfb.config.ts and add: main = "./dist/_worker.js" plus
# compatibility_flags = ["nodejs_compat"] here.
#
# `[assets] directory` is relative to this config file's directory (apps/demo/),
# so "./dist" resolves to apps/demo/dist/ — correct for a per-app wrangler config.

name = "zudo-sg-demo-site"

compatibility_date = "2024-12-01"

# workers_dev = false prevents serving on *.workers.dev production route.
# preview_urls = true enables version-preview URLs for staging (used by
# preview-deploy.yml / pr-checks.yml via `wrangler versions upload`).
preview_urls = true
workers_dev = false

# ---------------------------------------------------------------------------
# Static asset serving
# ---------------------------------------------------------------------------
[assets]
directory = "./dist"
not_found_handling = "404-page"

# ---------------------------------------------------------------------------
# Custom domain routing
# ---------------------------------------------------------------------------
[[routes]]
pattern = "zudo-sg-demo-site.takazudomodular.com"
custom_domain = true
