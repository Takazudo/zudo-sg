# Cloudflare Workers Static Assets configuration for the zudo-sg documentation site.
#
# This is a fully static site (no prerender=false API routes, no SSR adapter).
# So `main` and `nodejs_compat` are OMITTED.
# If an SSR route is added later, wire @takazudo/zfb-adapter-cloudflare in
# doc/zfb.config.ts and add: main = "./dist/_worker.js" plus
# compatibility_flags = ["nodejs_compat"] here.
#
# `[assets] directory` is relative to this config file's directory (doc/),
# so "./dist" resolves to doc/dist/ — correct for a per-app wrangler config.

name = "zudo-sg-doc"

compatibility_date = "2024-12-01"

# workers_dev = false prevents serving on *.workers.dev production route.
# preview_urls = true enables version-preview URLs used by preview-deploy.yml
# for same-repository PRs and dedicated preview branches via
# `wrangler versions upload`. pr-checks.yml handles quality checks separately.
preview_urls = true
workers_dev = false

# ---------------------------------------------------------------------------
# Static asset serving
# ---------------------------------------------------------------------------
[assets]
directory = "./dist"
not_found_handling = "404-page"

# ---------------------------------------------------------------------------
# Custom domain routing
# ---------------------------------------------------------------------------
[[routes]]
pattern = "zudo-sg-doc.takazudomodular.com"
custom_domain = true
