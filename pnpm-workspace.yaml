packages:
  - "."
  - "packages/*"
  - "apps/*"
  - "doc"
allowBuilds:
  esbuild: true
  lefthook: true
  # msw's postinstall only runs `msw init` (copies mockServiceWorker.js into
  # the workerDirectory declared in package.json's "msw" field below) — no
  # network access, so it's safe to allow; this keeps the generated worker
  # asset in sync with the installed msw version across future installs.
  msw: true
minimumReleaseAgeExclude:
  # First-party @takazudo packages — allowlisted by name so a freshly published
  # release (e.g. our own zudo-doc) installs without waiting out the
  # minimumReleaseAge supply-chain window. (history-server is a transitive dep
  # of zudo-doc.) minimumReleaseAgeExclude matches against package names.
  - '@takazudo/zudo-doc-history-server'
  - '@takazudo/zudo-doc'
  - '@takazudo/zdtp'
  # zfb next-channel packages: just-shipped next.68 may be within the
  # release-age window; exclude so the freshly published prerelease installs.
  - '@takazudo/zfb'
  - '@takazudo/zfb-runtime'
  - '@takazudo/zfb-adapter-cloudflare'
  # zfb platform-specific native binaries (optionalDependencies of zfb)
  - '@takazudo/zfb-darwin-arm64'
  - '@takazudo/zfb-darwin-x64'
  - '@takazudo/zfb-linux-arm64-gnu'
  - '@takazudo/zfb-linux-x64-gnu'
  - '@takazudo/zfb-win32-x64-msvc'
