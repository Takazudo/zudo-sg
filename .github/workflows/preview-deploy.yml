# Preview deployment for pull requests into `main` and the dedicated preview
# branches.
#
# Pull requests from this repository build GitHub's synthetic merge ref, so the
# preview represents the proposed branch applied to `main` at workflow start.
# Each PR receives a stable Cloudflare Workers preview alias (for example
# `pr-294`) that is updated on every push. Fork PRs are skipped because deploy
# secrets are not available to untrusted pull request code. Dependabot PRs are
# also skipped because GitHub treats their secrets and tokens like those from
# forks.
#
# Pushes to `preview` and `expreview/**` retain their branch-based aliases.
# This is the only workflow that deploys preview aliases; pr-checks.yml handles
# quality checks independently.
# All sites are fully static — no SSR adapter, no .assetsignore needed.

name: Preview Deploy

on:
  push:
    branches:
      - 'preview'
      - 'expreview/**'
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-deploy-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pin lives here — see DEPLOY.md §5 for the local dry-run commands, which
  # must be bumped in step with this value.
  WRANGLER_VERSION: "4.85.0"
  PREVIEW_SLUG_SOURCE: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}

jobs:
  # ---------------------------------------------------------------------------
  # Job: Build the root styleguide site
  # ---------------------------------------------------------------------------
  build-site:
    name: Build Styleguide Site
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build site
        run: pnpm build

      - name: Archive site build output
        run: tar -cf "$RUNNER_TEMP/site-dist.tar" -C dist .

      - name: Upload site build output
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: site-dist
          path: ${{ runner.temp }}/site-dist.tar
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job: Build the demo site (apps/demo)
  # ---------------------------------------------------------------------------
  build-demo:
    name: Build Demo Site
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build demo site
        run: pnpm --filter @zudo-sg/demo build

      - name: Archive demo build output
        run: tar -cf "$RUNNER_TEMP/demo-dist.tar" -C apps/demo/dist .

      - name: Upload demo build output
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: demo-dist
          path: ${{ runner.temp }}/demo-dist.tar
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job: Build the documentation site (doc)
  # ---------------------------------------------------------------------------
  build-doc:
    name: Build Documentation Site
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build doc site
        run: pnpm build:doc

      - name: Archive doc build output
        run: tar -cf "$RUNNER_TEMP/doc-dist.tar" -C doc/dist .

      - name: Upload doc build output
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: doc-dist
          path: ${{ runner.temp }}/doc-dist.tar
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job: Deploy root styleguide site preview alias
  # ---------------------------------------------------------------------------
  deploy-site:
    name: Deploy Styleguide Preview
    needs: [build-site]
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      deploy_url: ${{ steps.deploy-site.outputs.deploy_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Download site build output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: site-dist
          path: ${{ runner.temp }}

      - name: Extract site build output
        run: mkdir -p dist && tar -xf "$RUNNER_TEMP/site-dist.tar" -C dist

      - name: Determine preview slug
        id: preview
        run: |
          SOURCE_NAME="$PREVIEW_SLUG_SOURCE"
          # wrangler preview aliases must be lowercase [a-z0-9-].
          # Lowercase, replace every invalid char with a hyphen, collapse
          # repeats, and trim leading/trailing hyphens.
          PREVIEW_SLUG=$(echo "$SOURCE_NAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g; s/-\{2,\}/-/g; s/^-//; s/-$//')
          echo "slug=$PREVIEW_SLUG" >> "$GITHUB_OUTPUT"
          echo "Preview slug: $PREVIEW_SLUG"

      - name: Deploy styleguide preview alias
        id: deploy-site
        run: |
          SLUG="${{ steps.preview.outputs.slug }}"
          DEPLOY_LOG=$(mktemp)
          npx wrangler@${{ env.WRANGLER_VERSION }} versions upload \
            --config wrangler.toml \
            --preview-alias="$SLUG" \
            --message="Preview: ${SLUG} @ ${GITHUB_SHA:0:7}" \
            2>&1 | tee "$DEPLOY_LOG"

          DEPLOY_URL=$(grep -oE "https://${SLUG}-[a-z0-9.-]+\.workers\.dev" "$DEPLOY_LOG" | head -1)
          if [ -z "$DEPLOY_URL" ]; then
            echo "::error::Failed to parse alias preview URL for slug '$SLUG' from wrangler output"
            exit 1
          fi
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Styleguide preview URL: $DEPLOY_URL"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Retries through the brief window before a freshly uploaded version
      # alias becomes resolvable (see scripts/smoke-url.sh).
      - name: Smoke gate — styleguide preview homepage
        run: bash scripts/smoke-url.sh "${{ steps.deploy-site.outputs.deploy_url }}/" 200

  # ---------------------------------------------------------------------------
  # Job: Deploy demo site preview alias
  # ---------------------------------------------------------------------------
  deploy-demo:
    name: Deploy Demo Site Preview
    needs: [build-demo]
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      deploy_url: ${{ steps.deploy-demo.outputs.deploy_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Download demo build output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: demo-dist
          path: ${{ runner.temp }}

      - name: Extract demo build output
        run: mkdir -p apps/demo/dist && tar -xf "$RUNNER_TEMP/demo-dist.tar" -C apps/demo/dist

      - name: Determine preview slug
        id: preview
        run: |
          SOURCE_NAME="$PREVIEW_SLUG_SOURCE"
          PREVIEW_SLUG=$(echo "$SOURCE_NAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g; s/-\{2,\}/-/g; s/^-//; s/-$//')
          echo "slug=$PREVIEW_SLUG" >> "$GITHUB_OUTPUT"
          echo "Preview slug: $PREVIEW_SLUG"

      - name: Deploy demo site preview alias
        id: deploy-demo
        run: |
          SLUG="${{ steps.preview.outputs.slug }}"
          DEPLOY_LOG=$(mktemp)
          npx wrangler@${{ env.WRANGLER_VERSION }} versions upload \
            --config apps/demo/wrangler.toml \
            --preview-alias="$SLUG" \
            --message="Preview demo: ${SLUG} @ ${GITHUB_SHA:0:7}" \
            2>&1 | tee "$DEPLOY_LOG"

          DEPLOY_URL=$(grep -oE "https://${SLUG}-[a-z0-9.-]+\.workers\.dev" "$DEPLOY_LOG" | head -1)
          if [ -z "$DEPLOY_URL" ]; then
            echo "::error::Failed to parse alias preview URL for slug '$SLUG' from wrangler output"
            exit 1
          fi
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Demo site preview URL: $DEPLOY_URL"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Retries through the brief window before a freshly uploaded version
      # alias becomes resolvable (see scripts/smoke-url.sh).
      - name: Smoke gate — demo site preview homepage
        run: bash scripts/smoke-url.sh "${{ steps.deploy-demo.outputs.deploy_url }}/" 200

  # ---------------------------------------------------------------------------
  # Job: Deploy documentation site preview alias
  # ---------------------------------------------------------------------------
  deploy-doc:
    name: Deploy Documentation Site Preview
    needs: [build-doc]
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      deploy_url: ${{ steps.deploy-doc.outputs.deploy_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Download doc build output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: doc-dist
          path: ${{ runner.temp }}

      - name: Extract doc build output
        run: mkdir -p doc/dist && tar -xf "$RUNNER_TEMP/doc-dist.tar" -C doc/dist

      - name: Determine preview slug
        id: preview
        run: |
          SOURCE_NAME="$PREVIEW_SLUG_SOURCE"
          PREVIEW_SLUG=$(echo "$SOURCE_NAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g; s/-\{2,\}/-/g; s/^-//; s/-$//')
          echo "slug=$PREVIEW_SLUG" >> "$GITHUB_OUTPUT"
          echo "Preview slug: $PREVIEW_SLUG"

      - name: Deploy doc site preview alias
        id: deploy-doc
        run: |
          SLUG="${{ steps.preview.outputs.slug }}"
          DEPLOY_LOG=$(mktemp)
          npx wrangler@${{ env.WRANGLER_VERSION }} versions upload \
            --config doc/wrangler.toml \
            --preview-alias="$SLUG" \
            --message="Preview doc: ${SLUG} @ ${GITHUB_SHA:0:7}" \
            2>&1 | tee "$DEPLOY_LOG"

          DEPLOY_URL=$(grep -oE "https://${SLUG}-[a-z0-9.-]+\.workers\.dev" "$DEPLOY_LOG" | head -1)
          if [ -z "$DEPLOY_URL" ]; then
            echo "::error::Failed to parse alias preview URL for slug '$SLUG' from wrangler output"
            exit 1
          fi
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Doc site preview URL: $DEPLOY_URL"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Retries through the brief window before a freshly uploaded version
      # alias becomes resolvable (see scripts/smoke-url.sh).
      - name: Smoke gate — doc site preview homepage
        run: bash scripts/smoke-url.sh "${{ steps.deploy-doc.outputs.deploy_url }}/" 200

  # ---------------------------------------------------------------------------
  # Job: Post combined preview URLs to PR comment
  # ---------------------------------------------------------------------------
  comment-pr:
    name: Comment Preview URLs on PR
    needs: [deploy-site, deploy-demo, deploy-doc]
    if: >-
      always() &&
      (github.event_name == 'push' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Comment on associated PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          SITE_DEPLOY_URL: ${{ needs.deploy-site.outputs.deploy_url }}
          DEMO_DEPLOY_URL: ${{ needs.deploy-demo.outputs.deploy_url }}
          DOC_DEPLOY_URL: ${{ needs.deploy-doc.outputs.deploy_url }}
          SITE_DEPLOY_RESULT: ${{ needs.deploy-site.result }}
          DEMO_DEPLOY_RESULT: ${{ needs.deploy-demo.result }}
          DOC_DEPLOY_RESULT: ${{ needs.deploy-doc.result }}
        with:
          script: |
            let prNumber;
            let sourceDescription;

            if (context.eventName === 'pull_request') {
              const pr = context.payload.pull_request;
              prNumber = pr.number;
              sourceDescription = `PR #${pr.number} into \`${pr.base.ref}\``;
            } else {
              const branch = context.ref.replace('refs/heads/', '');
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${branch}`,
                state: 'open'
              });

              if (prs.length === 0) {
                console.log('No open PR found for this branch, skipping comment');
                return;
              }

              if (prs.some(pr => pr.base.ref === 'main')) {
                console.log('A main-targeting PR has its own merge-preview comment, skipping branch-preview comment');
                return;
              }

              prNumber = prs[0].number;
              sourceDescription = `branch \`${branch}\``;
            }

            const siteUrl = process.env.SITE_DEPLOY_URL;
            const demoUrl = process.env.DEMO_DEPLOY_URL;
            const docUrl = process.env.DOC_DEPLOY_URL;
            const siteResult = process.env.SITE_DEPLOY_RESULT;
            const demoResult = process.env.DEMO_DEPLOY_RESULT;
            const docResult = process.env.DOC_DEPLOY_RESULT;
            const shortSha = context.sha.substring(0, 7);
            const marker = '<!-- cf-preview -->';
            const legacyMarker = '<!-- cf-preview-branch -->';
            const allSucceeded = [siteResult, demoResult, docResult].every(
              result => result === 'success'
            );
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const previewRows = [
              ['Styleguide', siteResult, siteUrl],
              ['Composer', siteResult, siteUrl && `${siteUrl.replace(/\/$/, '')}/composer`],
              ['Demo', demoResult, demoUrl],
              ['Docs', docResult, docUrl],
            ].map(([name, result, url]) =>
              `| ${name} | ${result} | ${result === 'success' && url ? url : '—'} |`
            );

            const body = [
              marker,
              `## Cloudflare Workers Assets Preview`,
              '',
              allSucceeded
                ? `Preview deployments are ready.`
                : `⚠️ Preview deployment did not complete. Stable aliases may temporarily point to different commits until the next successful run.`,
              '',
              `| Site | Status | URL |`,
              `|---|---|---|`,
              ...previewRows,
              '',
              `Built from ${sourceDescription} @ \`${shortSha}\``,
              '',
              `[View workflow run](${runUrl})`,
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find(
              c => c.user?.login === 'github-actions[bot]' &&
                (c.body?.includes(marker) || c.body?.includes(legacyMarker))
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
