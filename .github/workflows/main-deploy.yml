# Production deployment workflow for the zudo-sg styleguide host + demo site + standalone styleguide.
#
# Triggered on every push to `main`. The pipeline:
#   1. Builds all three static sites in parallel (root + apps/demo + apps/styleguide)
#   2. Deploys root site to Worker `zudo-sg` (zudo-sg.takazudomodular.com)
#   3. Deploys demo site to Worker `zudo-sg-demo-site` (zudo-sg-demo-site.takazudomodular.com)
#   4. Deploys standalone styleguide to Worker `zudo-sg-styleguide` (zudo-sg-styleguide.takazudomodular.com)
#   5. Per-subdomain smoke gates for each deployed site
#
# All three sites are fully static (no SSR adapter). None generate
# _worker.js or _zfb_inner.mjs, so no .assetsignore step is needed.
# If an SSR route is added to any site in future, add the .assetsignore
# write step before the corresponding wrangler deploy call (see DEPLOY.md).
#
# Inter-job data sharing uses actions/upload-artifact + actions/download-artifact
# (retention-days: 1 keeps storage bounded; artifacts are scoped to a single run).
#
# Concurrency: only one production deploy runs at a time.
# We do NOT cancel in-progress runs — the earlier deploy should finish.

name: Production Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job: Build the root styleguide site
  # ---------------------------------------------------------------------------
  build-site:
    name: Build Styleguide Site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          dest: ~/setup-pnpm-${{ github.job }}

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Archive site build output
        # tar includes dotfiles (e.g. .assetsignore if written in future).
        run: tar -cf "$RUNNER_TEMP/site-dist.tar" -C dist .

      - name: Upload site build output
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: site-dist
          path: ${{ runner.temp }}/site-dist.tar
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job: Build the demo site (apps/demo)
  # ---------------------------------------------------------------------------
  build-demo:
    name: Build Demo Site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          dest: ~/setup-pnpm-${{ github.job }}

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build demo site
        run: pnpm --filter @zudo-sg/demo build

      - name: Archive demo build output
        run: tar -cf "$RUNNER_TEMP/demo-dist.tar" -C apps/demo/dist .

      - name: Upload demo build output
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: demo-dist
          path: ${{ runner.temp }}/demo-dist.tar
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job: Deploy root styleguide site to Cloudflare Workers (zudo-sg)
  # ---------------------------------------------------------------------------
  deploy-site:
    name: Deploy Styleguide to Cloudflare Workers
    needs: [build-site]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        # wrangler reads wrangler.toml from the repo root at deploy time.
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download site build output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: site-dist
          path: ${{ runner.temp }}

      - name: Extract site build output
        run: mkdir -p dist && tar -xf "$RUNNER_TEMP/site-dist.tar" -C dist

      - name: Deploy to Cloudflare Workers
        run: npx wrangler@4.85.0 deploy --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Retries through the first-deploy DNS/cert propagation window (see
      # scripts/smoke-url.sh) — the custom domain is auto-provisioned by the
      # `wrangler deploy` above, but propagation isn't instant on first creation.
      - name: Smoke gate — styleguide homepage
        run: bash scripts/smoke-url.sh "https://zudo-sg.takazudomodular.com/" 200

      - name: Smoke gate — styleguide 404 page
        run: bash scripts/smoke-url.sh "https://zudo-sg.takazudomodular.com/this-page-does-not-exist" 404

  # ---------------------------------------------------------------------------
  # Job: Deploy demo site to Cloudflare Workers (zudo-sg-demo-site)
  # ---------------------------------------------------------------------------
  deploy-demo:
    name: Deploy Demo Site to Cloudflare Workers
    needs: [build-demo]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        # wrangler reads apps/demo/wrangler.toml at deploy time.
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download demo build output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: demo-dist
          path: ${{ runner.temp }}

      - name: Extract demo build output
        run: mkdir -p apps/demo/dist && tar -xf "$RUNNER_TEMP/demo-dist.tar" -C apps/demo/dist

      - name: Deploy to Cloudflare Workers
        run: npx wrangler@4.85.0 deploy --config apps/demo/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Retries through the first-deploy DNS/cert propagation window (see
      # scripts/smoke-url.sh).
      - name: Smoke gate — demo site homepage
        run: bash scripts/smoke-url.sh "https://zudo-sg-demo-site.takazudomodular.com/" 200

  # ---------------------------------------------------------------------------
  # Job: Build the standalone styleguide app (apps/styleguide)
  # ---------------------------------------------------------------------------
  build-styleguide:
    name: Build Standalone Styleguide
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          dest: ~/setup-pnpm-${{ github.job }}

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build standalone styleguide
        run: pnpm --filter @zudo-sg/styleguide build

      - name: Archive standalone styleguide build output
        run: tar -cf "$RUNNER_TEMP/styleguide-dist.tar" -C apps/styleguide/dist .

      - name: Upload standalone styleguide build output
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: styleguide-dist
          path: ${{ runner.temp }}/styleguide-dist.tar
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job: Deploy standalone styleguide to Cloudflare Workers (zudo-sg-styleguide)
  # ---------------------------------------------------------------------------
  deploy-styleguide:
    name: Deploy Standalone Styleguide to Cloudflare Workers
    needs: [build-styleguide]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        # wrangler reads apps/styleguide/wrangler.toml at deploy time.
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download standalone styleguide build output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: styleguide-dist
          path: ${{ runner.temp }}

      - name: Extract standalone styleguide build output
        run: mkdir -p apps/styleguide/dist && tar -xf "$RUNNER_TEMP/styleguide-dist.tar" -C apps/styleguide/dist

      - name: Deploy to Cloudflare Workers
        run: npx wrangler@4.85.0 deploy --config apps/styleguide/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Retries through the first-deploy DNS/cert propagation window (see
      # scripts/smoke-url.sh).
      - name: Smoke gate — standalone styleguide homepage
        run: bash scripts/smoke-url.sh "https://zudo-sg-styleguide.takazudomodular.com/" 200

      - name: Smoke gate — standalone styleguide 404 page
        run: bash scripts/smoke-url.sh "https://zudo-sg-styleguide.takazudomodular.com/this-page-does-not-exist" 404
