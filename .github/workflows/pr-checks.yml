# Pull request quality checks — mirrors the b4push local gate in CI.
#
# Triggered on PRs targeting `main` or any `base/**` branch (epic-PR stacks).
#
# Jobs (in execution order):
#   lint-tokens          — pnpm lint:tokens (owned by S2; no-op pass until S2 merges)
#   typecheck            — pnpm check (zfb check / tsc --noEmit)
#   unit                 — pnpm test:unit (vitest)
#   build                — pnpm build (zfb build → dist/)
#   build-demo           — pnpm --filter @zudo-sg/demo build (apps/demo)
#   smoke-e2e            — pnpm test:e2e:ci (Playwright smoke, needs build job)
#   link-check           — pnpm check:links (needs build job)
#   html-validate        — pnpm check:html (needs build job)
#
# Node 22 + pnpm via pnpm/action-setup@v4.
# Root build output shared between jobs via actions/cache to avoid re-building.

name: PR Checks

on:
  pull_request:
    branches:
      - main
      - "base/**"

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PNPM_VERSION: "11.5.2"
  NODE_VERSION: "22"

jobs:
  # ---------------------------------------------------------------------------
  # Job: Design token lint
  # Owned by S2. On the bare scaffold (before S2 merges) lint:tokens is a
  # no-op pass. Once S2 merges, this job enforces the token lint rules.
  # ---------------------------------------------------------------------------
  lint-tokens:
    name: Design Token Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Design token lint
        # lint:tokens is defined by S2. Until S2 merges, this step passes
        # because the script either does not exist (pnpm exits 0 with a warning
        # on missing optional scripts via the || true fallback) or is a no-op.
        run: pnpm run lint:tokens || echo "lint:tokens not yet defined (S2 pending) — OK"

  # ---------------------------------------------------------------------------
  # Job: TypeScript typecheck
  # ---------------------------------------------------------------------------
  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

  # ---------------------------------------------------------------------------
  # Job: Unit tests (vitest)
  # ---------------------------------------------------------------------------
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

  # ---------------------------------------------------------------------------
  # Job: Build
  # Produces dist/ and caches it for downstream jobs (smoke-e2e, link-check,
  # html-validate).
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Cache dist
        uses: actions/cache/save@v4
        with:
          path: dist
          key: dist-${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Job: Build Demo Site
  # Builds apps/demo (@zudo-sg/demo) independently so demo-breaking changes are
  # caught on every PR rather than only on production deploy.
  # ---------------------------------------------------------------------------
  build-demo:
    name: Build Demo Site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build demo site
        run: pnpm --filter @zudo-sg/demo build

  # ---------------------------------------------------------------------------
  # Job: Playwright smoke e2e (T1)
  # Runs a single smoke spec against the pre-built dist/. Requires build job.
  # ---------------------------------------------------------------------------
  smoke-e2e:
    name: Smoke E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore dist cache
        uses: actions/cache/restore@v4
        with:
          path: dist
          key: dist-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run smoke e2e
        run: pnpm test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job: Internal link check
  # Scans dist/ HTML for broken internal links. Requires build job.
  # ---------------------------------------------------------------------------
  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore dist cache
        uses: actions/cache/restore@v4
        with:
          path: dist
          key: dist-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Check links
        run: pnpm check:links

  # ---------------------------------------------------------------------------
  # Job: HTML validation
  # Validates built HTML against html-validate rules. Requires build job.
  # ---------------------------------------------------------------------------
  html-validate:
    name: HTML Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore dist cache
        uses: actions/cache/restore@v4
        with:
          path: dist
          key: dist-${{ github.sha }}
          fail-on-cache-miss: true

      - name: HTML validate
        run: pnpm check:html
