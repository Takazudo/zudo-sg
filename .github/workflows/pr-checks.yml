# Pull request quality checks — mirrors the b4push local gate in CI.
#
# Triggered on PRs targeting `main` or any `base/**` branch (epic-PR stacks).
#
# Jobs (in execution order):
#   lint-tokens          — pnpm lint:tokens
#   codegen-drift        — pnpm check:z-index, pnpm check:sg-registry,
#                          pnpm check:story-categories, pnpm check:token-manifest,
#                          pnpm check:root-token-manifest
#   typecheck            — pnpm check (zfb check / tsc --noEmit + demo/doc typecheck)
#   unit                 — pnpm test:unit (vitest)
#   build                — pnpm build (zfb build → dist/)
#   build-demo           — pnpm --filter @zudo-sg/demo build (apps/demo), then
#                          pnpm check:links:demo against apps/demo/dist
#   build-doc            — pnpm build:doc (doc), then pnpm check:links:doc
#                          against doc/dist
#   smoke-e2e            — pnpm test:e2e:ci (Playwright: styleguide smoke
#                          [smoke, preview-token-panel] + the 5 composer
#                          projects [composer, composer-persistence,
#                          composer-production-boundary, composer-contracts,
#                          composer-verification] + composer-reuse + demo-smoke,
#                          needs build + build-demo)
#   dist-checks          — pnpm check:links + pnpm check:html against dist/
#                          (needs build job; merged into one job since both
#                          only need the same dist/ cache restore)
#   file-provider-e2e    — pnpm test:e2e:composer-file (Playwright, dev-server-
#                          backed file provider suite; no needs, builds its own
#                          zfb dev server from source)
#
# Node 22 + pnpm via the shared .github/actions/setup composite action (pnpm
# version comes from the packageManager field in package.json).
# Root and demo build output shared between jobs via actions/cache to avoid
# re-building.

name: PR Checks

on:
  pull_request:
    branches:
      - main
      - "base/**"

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job: Design token lint
  # ---------------------------------------------------------------------------
  lint-tokens:
    name: Design Token Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup
        uses: ./.github/actions/setup

      - name: Design token lint
        run: pnpm run lint:tokens

  # ---------------------------------------------------------------------------
  # Job: Codegen drift check
  # Verifies generated files are in sync with their source of truth — fails if
  # someone hand-edits a generated block or forgets to re-run the generator
  # after adding/removing a source (z-index tier / story file / token manifest).
  # ---------------------------------------------------------------------------
  codegen-drift:
    name: Codegen Drift Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup
        uses: ./.github/actions/setup

      - name: Check z-index codegen
        run: pnpm check:z-index

      - name: Check sg-registry codegen
        run: pnpm check:sg-registry

      - name: Check story-categories codegen
        run: pnpm check:story-categories

      - name: Check token manifest codegen
        run: pnpm check:token-manifest

      - name: Check root token manifest codegen
        run: pnpm check:root-token-manifest

  # ---------------------------------------------------------------------------
  # Job: TypeScript typecheck
  # ---------------------------------------------------------------------------
  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup
        uses: ./.github/actions/setup

      - name: Type check
        run: pnpm check

  # ---------------------------------------------------------------------------
  # Job: Unit tests (vitest)
  # ---------------------------------------------------------------------------
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run unit tests
        run: pnpm test:unit

  # ---------------------------------------------------------------------------
  # Job: Build
  # Produces dist/ and caches it for downstream jobs (smoke-e2e, dist-checks).
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build site
        run: pnpm build

      - name: Cache dist
        uses: actions/cache/save@v4
        with:
          path: dist
          key: dist-${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Job: Build Demo Site
  # Builds apps/demo (@zudo-sg/demo) independently so demo-breaking changes are
  # caught on every PR rather than only on production deploy. Also link-checks
  # the demo build — its footer/nav hard-code cross-site URLs that nothing else
  # validates — and caches the dist for the smoke-e2e job's demo-smoke project.
  # ---------------------------------------------------------------------------
  build-demo:
    name: Build Demo Site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build demo site
        run: pnpm --filter @zudo-sg/demo build

      - name: Cache demo dist
        uses: actions/cache/save@v4
        with:
          path: apps/demo/dist
          key: demo-dist-${{ github.sha }}

      - name: Check demo links
        run: pnpm check:links:demo

  # ---------------------------------------------------------------------------
  # Job: Build Documentation Site
  # Builds doc (@zudo-sg/doc) independently so doc-breaking changes are caught
  # on every PR. Also link-checks doc/dist.
  # ---------------------------------------------------------------------------
  build-doc:
    name: Build Documentation Site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build doc site
        run: pnpm build:doc

      - name: Check doc links
        run: pnpm check:links:doc

  # ---------------------------------------------------------------------------
  # Job: Playwright smoke e2e (T1)
  # Runs the full default playwright.config.ts gate: styleguide smoke (smoke,
  # preview-token-panel) + the 5 composer projects (composer, composer-persistence,
  # composer-production-boundary, composer-contracts, composer-verification) +
  # composer-reuse + demo-smoke. playwright.config.ts declares one webServer per
  # dist (styleguide + demo) and Playwright starts both regardless of --project
  # filtering, so this job needs both build jobs' output.
  # ---------------------------------------------------------------------------
  smoke-e2e:
    name: Smoke E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build, build-demo]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup
        uses: ./.github/actions/setup

      - name: Restore dist cache
        uses: actions/cache/restore@v4
        with:
          path: dist
          key: dist-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Restore demo dist cache
        uses: actions/cache/restore@v4
        with:
          path: apps/demo/dist
          key: demo-dist-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run smoke e2e
        run: pnpm test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job: Dist checks (link check + HTML validation)
  # Both only need the build job's dist/ cache restore, so they're merged into
  # one job to avoid a second redundant checkout/install.
  # ---------------------------------------------------------------------------
  dist-checks:
    name: Dist Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup
        uses: ./.github/actions/setup

      - name: Restore dist cache
        uses: actions/cache/restore@v4
        with:
          path: dist
          key: dist-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Check links
        run: pnpm check:links

      - name: HTML validate
        run: pnpm check:html

  # ---------------------------------------------------------------------------
  # Job: File provider e2e
  # Runs the composer-file-provider suite, which drives `zfb dev` from source
  # (not a dist/ preview) and writes to the gitignored compositions/ dir — kept
  # out of smoke-e2e's static-preview matrix, so no `needs: build`.
  # ---------------------------------------------------------------------------
  file-provider-e2e:
    name: File Provider E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run file provider e2e
        run: pnpm test:e2e:composer-file

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-file-provider
          path: playwright-report/
          retention-days: 7
