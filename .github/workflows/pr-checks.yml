# Pull request quality checks — mirrors the b4push local gate in CI.
#
# Triggered on PRs targeting `main` or any `base/**` branch (epic-PR stacks).
#
# Jobs (in execution order):
#   lint-tokens          — pnpm lint:tokens
#   codegen-drift        — pnpm check:z-index, pnpm check:sg-registry, pnpm check:token-manifest
#   typecheck            — pnpm check (zfb check / tsc --noEmit + demo typecheck)
#   unit                 — pnpm test:unit (vitest)
#   build                — pnpm build (zfb build → dist/)
#   build-demo           — pnpm --filter @zudo-sg/demo build (apps/demo), then
#                          pnpm check:links:demo against apps/demo/dist
#   smoke-e2e            — pnpm test:e2e:ci (Playwright: styleguide + demo smoke
#                          projects, needs build + build-demo)
#   link-check           — pnpm check:links (needs build job)
#   html-validate        — pnpm check:html (needs build job)
#
# Node 22 + pnpm via pnpm/action-setup@v4.
# Root and demo build output shared between jobs via actions/cache to avoid
# re-building.

name: PR Checks

on:
  pull_request:
    branches:
      - main
      - "base/**"

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PNPM_VERSION: "11.5.2"
  NODE_VERSION: "22"

jobs:
  # ---------------------------------------------------------------------------
  # Job: Design token lint
  # ---------------------------------------------------------------------------
  lint-tokens:
    name: Design Token Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Design token lint
        run: pnpm run lint:tokens

  # ---------------------------------------------------------------------------
  # Job: Codegen drift check
  # Verifies generated files are in sync with their source of truth — fails if
  # someone hand-edits a generated block or forgets to re-run the generator
  # after adding/removing a source (z-index tier / story file / token manifest).
  # ---------------------------------------------------------------------------
  codegen-drift:
    name: Codegen Drift Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check z-index codegen
        run: pnpm check:z-index

      - name: Check sg-registry codegen
        run: pnpm check:sg-registry

      - name: Check token manifest codegen
        run: pnpm check:token-manifest

  # ---------------------------------------------------------------------------
  # Job: TypeScript typecheck
  # ---------------------------------------------------------------------------
  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

  # ---------------------------------------------------------------------------
  # Job: Unit tests (vitest)
  # ---------------------------------------------------------------------------
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

  # ---------------------------------------------------------------------------
  # Job: Build
  # Produces dist/ and caches it for downstream jobs (smoke-e2e, link-check,
  # html-validate).
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Cache dist
        uses: actions/cache/save@v4
        with:
          path: dist
          key: dist-${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Job: Build Demo Site
  # Builds apps/demo (@zudo-sg/demo) independently so demo-breaking changes are
  # caught on every PR rather than only on production deploy. Also link-checks
  # the demo build — its footer/nav hard-code cross-site URLs that nothing else
  # validates — and caches the dist for the smoke-e2e job's demo-smoke project.
  # ---------------------------------------------------------------------------
  build-demo:
    name: Build Demo Site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build demo site
        run: pnpm --filter @zudo-sg/demo build

      - name: Cache demo dist
        uses: actions/cache/save@v4
        with:
          path: apps/demo/dist
          key: demo-dist-${{ github.sha }}

      - name: Check demo links
        run: pnpm check:links:demo

  # ---------------------------------------------------------------------------
  # Job: Playwright smoke e2e (T1)
  # Runs the styleguide smoke specs plus the demo-smoke project. playwright.config.ts
  # declares one webServer per dist (styleguide + demo) and Playwright starts both
  # regardless of --project filtering, so this job needs both build jobs' output.
  # ---------------------------------------------------------------------------
  smoke-e2e:
    name: Smoke E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build, build-demo]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore dist cache
        uses: actions/cache/restore@v4
        with:
          path: dist
          key: dist-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Restore demo dist cache
        uses: actions/cache/restore@v4
        with:
          path: apps/demo/dist
          key: demo-dist-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run smoke e2e
        run: pnpm test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job: Internal link check
  # Scans dist/ HTML for broken internal links. Requires build job.
  # ---------------------------------------------------------------------------
  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore dist cache
        uses: actions/cache/restore@v4
        with:
          path: dist
          key: dist-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Check links
        run: pnpm check:links

  # ---------------------------------------------------------------------------
  # Job: HTML validation
  # Validates built HTML against html-validate rules. Requires build job.
  # ---------------------------------------------------------------------------
  html-validate:
    name: HTML Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore dist cache
        uses: actions/cache/restore@v4
        with:
          path: dist
          key: dist-${{ github.sha }}
          fail-on-cache-miss: true

      - name: HTML validate
        run: pnpm check:html
